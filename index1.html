<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор статуса и Чат</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            padding: 24px;
            width: 100%;
            max-width: 450px;
            margin-bottom: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .user-name {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: #000;
        }

        .main-timer {
            font-size: 2rem;
            font-weight: bold;
            color: #2b76ff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        /* Кнопки действий */
        .btn-action {
            width: 100%;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 1.05rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-stop { background-color: #dc3545; }
        
        .sub-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .btn-pause { background-color: #ffb703; color: #000; }
        .btn-exit { background-color: #6c757d; }

        /* Монитор группы */
        .section-title {
            font-size: 1.15rem;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #000;
        }

        .user-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 5px;
            border-bottom: 1px solid #f0f0f0;
            text-align: left;
        }
        .user-item:last-child { border-bottom: none; }

        .user-left {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            font-size: 1.05rem;
        }

        .online-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #ccc; /* Оффлайн по умолчанию */
        }
        .online-indicator.is-online {
            background-color: #28a745;
            box-shadow: 0 0 8px #28a745;
        }

        .user-right {
            text-align: right;
            font-size: 0.85rem;
            color: #666;
        }
        .status-container {
            display: flex;
            align-items: center;
            gap: 4px;
            justify-content: flex-end;
        }
        .user-study-time {
            color: #2b76ff;
            font-size: 0.8rem;
            margin-top: 2px;
        }

        /* Общий чат */
        .chat-box {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            height: 180px;
            overflow-y: auto;
            padding: 12px;
            text-align: left;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .chat-msg {
            font-size: 0.95rem;
            line-height: 1.4;
        }
        .chat-msg strong { color: #000; }

        .chat-input-row {
            display: flex;
            gap: 8px;
        }
        .chat-input {
            flex-grow: 1;
            border: 1px solid #ced4da;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.95rem;
            outline: none;
        }
        .btn-send {
            background-color: #2ec4b6;
            border: none;
            border-radius: 10px;
            width: 45px;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="user-name" id="myUsername">Загрузка...</div>
        <div class="main-timer">
            ⏱️ <span id="myTimer">0ч 0м 0с</span>
        </div>
        <button class="btn-action btn-stop" onclick="changeStatus('📚 Учусь', '#28a745')">⛔ Завершить сессию</button>
        <div class="sub-buttons">
            <button class="btn-action btn-pause" onclick="changeStatus('☕ Перерыв', '#ffb703')">☕ Перерыв</button>
            <button class="btn-action btn-exit" onclick="changeStatus('🏠 Дома', '#6c757d')">Выход</button>
        </div>
    </div>

    <div class="card">
        <div class="section-title">👥 Монитор группы</div>
        <div id="groupList">Загрузка списка участников...</div>
    </div>

    <div class="card">
        <div class="section-title">💬 Общий чат</div>
        <div class="chat-box" id="chatBox"></div>
        <div class="chat-input-row">
            <input type="text" class="chat-input" id="chatInput" placeholder="Сообщение..." onkeydown="if(event.key === 'Enter') sendMessage()">
            <button class="btn-send" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const URL = 'https://ebthetkjsjztqrphpezd.supabase.co';
        const KEY = 'sb_publishable_QIrCnDGwRs40BVSxdfns1w_nKC0Gqb2'; 
        const supabase = createClient(URL, KEY);

        const MY_ID = '1d4576d0-2cf3-434c-9ed1-6322f2d66dea';
        
        let usersData = [];
        let onlineUsers = {};
        let currentUserName = "Пользователь";

        function formatTime(totalSeconds) {
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            return `${hours}ч ${minutes}м ${seconds}с`;
        }

        // Изменение статуса
        window.changeStatus = async (text, color) => {
            const { error } = await supabase
                .from('profiles')
                .update({ 
                    status: text, 
                    color: color,
                    last_status_change: new Date().toISOString() 
                })
                .eq('id', MY_ID);

            if (error) console.error(error);
            else fetchGroup();
        };

        // Получение пользователей
        async function fetchGroup() {
            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .order('username', { ascending: true });

            if (error) return console.error(error);
            usersData = data;
            
            const me = data.find(u => u.id === MY_ID);
            if (me) {
                currentUserName = me.username;
                document.getElementById('myUsername').innerText = me.username;
            }
            renderGroupList();
        }

        // Отрендерить монитор группы
        function renderGroupList() {
            const list = document.getElementById('groupList');
            if (!usersData.length) return;

            list.innerHTML = usersData.map(user => {
                const isOnline = !!onlineUsers[user.id];
                const isLearning = user.status === '📚 Учусь';
                
                // Рассчитываем прошедшее время
                let secondsElapsed = 0;
                if (user.last_status_change) {
                    secondsElapsed = Math.floor((Date.now() - new Date(user.last_status_change).getTime()) / 1000);
                    if (secondsElapsed < 0) secondsElapsed = 0;
                }

                // Обновляем главный таймер текущего юзера, если это он
                if (user.id === MY_ID) {
                    document.getElementById('myTimer').innerText = formatTime(secondsElapsed);
                }

                return `
                    <div class="user-item">
                        <div class="user-left">
                            <div class="online-indicator ${isOnline ? 'is-online' : ''}"></div>
                            <span>${user.username}</span>
                        </div>
                        <div class="user-right">
                            <div class="status-container">
                                <span>${user.status === '🏠 Дома' ? '🏠' : (user.status === '☕ Перерыв' ? '☕' : '📚')}</span>
                                <span>${user.status || 'Вне сети'}</span>
                            </div>
                            <div class="user-study-time" id="time-${user.id}" data-start="${user.last_status_change || ''}" data-active="${isLearning}">
                                ⏱️ ${formatTime(secondsElapsed)}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Секундомер (Тиканье интерфейса раз в секунду)
        setInterval(() => {
            document.querySelectorAll('.user-study-time').forEach(el => {
                const isLearning = el.getAttribute('data-active') === 'true';
                const startStr = el.getAttribute('data-start');
                
                if (isLearning && startStr) {
                    const seconds = Math.floor((Date.now() - new Date(startStr).getTime()) / 1000);
                    if (seconds >= 0) {
                        el.innerHTML = `⏱️ ${formatTime(seconds)}`;
                        // Если это таймер текущего юзера, дублируем в верхнюю карточку
                        if (el.id === `time-${MY_ID}`) {
                            document.getElementById('myTimer').innerText = formatTime(seconds);
                        }
                    }
                }
            });
        }, 1000);

        // --- РАБОТА С ЧАТОМ ---
        async function fetchMessages() {
            const { data, error } = await supabase
                .from('messages')
                .select('*')
                .order('id', { ascending: false })
                .limit(30);

            if (error) return console.error(error);
            
            const chatBox = document.getElementById('chatBox');
            // Переворачиваем обратно, чтобы старые были сверху, новые снизу
            chatBox.innerHTML = data.reverse().map(msg => `
                <div class="chat-msg">
                    <strong>${msg.username}:</strong> ${escapeHTML(msg.text)}
                </div>
            `).join('');
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        window.sendMessage = async () => {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';

            const { error } = await supabase
                .from('messages')
                .insert([{ user_id: MY_ID, username: currentUserName, text: text }]);

            if (error) console.error(error);
        };

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }

        // --- SUPABASE REALTIME & PRESENCE (Слушатели событий) ---
        
        // 1. Канал для Онлайн-статусов
        const presenceChannel = supabase.channel('online-tracker');
        presenceChannel
            .on('presence', { event: 'sync' }, () => {
                const state = presenceChannel.presenceState();
                onlineUsers = {};
                Object.keys(state).forEach(id => {
                    const pres = state[id];
                    if (pres && pres[0]) onlineUsers[pres[0].user_id] = true;
                });
                renderGroupList();
            })
            .subscribe(async (status) => {
                if (status === 'SUBSCRIBED') {
                    await presenceChannel.track({ user_id: MY_ID });
                }
            });

        // 2. Канал для авто-обновления сообщений чата в реальном времени
        supabase
            .channel('chat-realtime')
            .on('postgres_changes', { event: 'INSERT', scheme: 'public', table: 'messages' }, payload => {
                fetchMessages();
            })
            .subscribe();

        // Первичный запуск данных
        fetchGroup();
        fetchMessages();
        
        // Каждые 15 секунд синхронизируем базу (если кто-то сменил статус кнопкой)
        setInterval(fetchGroup, 15000);
    </script>
</body>
</html>
