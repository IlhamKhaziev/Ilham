<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BaaS - Исправлено</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button#mainBtn { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; }
        .post { background: #fff; border: 1px solid #eaeaea; padding: 15px; margin-top: 15px; border-radius: 8px; width: 100%; max-width: 500px; }
        .actions { display: flex; gap: 10px; margin-top: 10px; }
        .btn-action { cursor: pointer; border: none; background: #f8f9fa; padding: 6px 12px; border-radius: 20px; font-size: 14px; }
        .btn-edit { background: #e7f3ff; color: #007bff; font-weight: bold; }
        .time { font-size: 11px; color: #999; float: right; }
    </style>
</head>
<body>

    <div class="container">
        <h3>Панель управления данными</h3>
        <input type="text" id="name" placeholder="Имя профиля">
        <input type="email" id="email" placeholder="Рабочий Email">
        <button id="mainBtn">Опубликовать в облако</button>
    </div>

    <div id="feed" style="width: 100%; max-width: 500px;"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { 
            getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
            serverTimestamp, updateDoc, doc, increment 
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBucYbom6btGkn1kBhV72RXAd7dGamxJq0",
            authDomain: "ilham-d9438.firebaseapp.com",
            projectId: "ilham-d9438",
            storageBucket: "ilham-d9438.firebasestorage.app",
            messagingSenderId: "498564012469",
            appId: "1:498564012469:web:d3ace73422dac888b021fc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 1. ФУНКЦИЯ РЕДАКТИРОВАНИЯ (Теперь сохраняет в базу)
        window.editEntry = async (id, oldName) => {
            const newName = prompt("Введите новое название:", oldName);
            if (newName && newName !== oldName) {
                const docRef = doc(db, "requests", id);
                try {
                    // Это действие меняет данные прямо в Firebase
                    await updateDoc(docRef, { name: newName });
                } catch (e) {
                    alert("Ошибка при сохранении в базу: " + e.message);
                }
            }
        };

        // 2. ФУНКЦИЯ ЛАЙКОВ И ДИЗЛАЙКОВ
        window.changeStat = async (id, field) => {
            const docRef = doc(db, "requests", id);
            try {
                // Изменяем либо 'likes', либо 'dislikes' на +1
                await updateDoc(docRef, { [field]: increment(1) });
            } catch (e) {
                console.error("Ошибка обновления:", e);
            }
        };

        // Добавление новой записи
        document.getElementById('mainBtn').onclick = async () => {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            if(!name || !email) return alert("Заполните поля");

            try {
                await addDoc(collection(db, "requests"), {
                    name: name,
                    email: email,
                    likes: 0,
                    dislikes: 0, // Инициализируем, чтобы кнопки работали сразу
                    timestamp: serverTimestamp()
                });
                document.getElementById('name').value = "";
                document.getElementById('email').value = "";
            } catch (e) {
                alert("Ошибка публикации");
            }
        };

        // Слушатель базы данных
        const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                feed.innerHTML += `
                    <div class="post">
                        <span class="time">${data.timestamp?.toDate().toLocaleString() || '...'}</span>
                        <b>${data.name}</b>
                        <p>${data.email}</p>
                        <div class="actions">
                            <button class="btn-action btn-edit" onclick="editEntry('${doc.id}', '${data.name}')">✏️ edit</button>
                            <button class="btn-action" onclick="changeStat('${doc.id}', 'likes')">👍 ${data.likes || 0}</button>
                            <button class="btn-action" onclick="changeStat('${doc.id}', 'dislikes')">👎 ${data.dislikes || 0}</button>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
