<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BaaS - Исправлено</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button#mainBtn { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .post { background: #fff; border: 1px solid #eaeaea; padding: 15px; margin-top: 15px; border-radius: 8px; width: 100%; max-width: 500px; position: relative; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .like-btn { cursor: pointer; border: none; background: #f8f9fa; padding: 5px 12px; border-radius: 20px; font-size: 14px; transition: 0.2s; }
        .like-btn:hover { background: #e2e6ea; }
        .edit-link { color: #007bff; cursor: pointer; font-size: 12px; text-decoration: underline; margin-left: 10px; }
        .time { font-size: 11px; color: #999; float: right; }
    </style>
</head>
<body>

    <div class="container">
        <h3>Панель управления данными</h3>
        <input type="text" id="name" placeholder="Имя профиля">
        <input type="email" id="email" placeholder="Рабочий Email">
        <button id="mainBtn">Опубликовать в облако</button>
    </div>

    <div id="feed" style="width: 100%; max-width: 500px;"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { 
            getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
            serverTimestamp, updateDoc, doc, increment 
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBucYbom6btGkn1kBhV72RXAd7dGamxJq0",
            authDomain: "ilham-d9438.firebaseapp.com",
            projectId: "ilham-d9438",
            storageBucket: "ilham-d9438.firebasestorage.app",
            messagingSenderId: "498564012469",
            appId: "1:498564012469:web:d3ace73422dac888b021fc",
            measurementId: "G-PHBGQD3JJJ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Функция изменения счетчиков (лайки/дизлайки)
        window.processReaction = async (id, field) => {
            const docRef = doc(db, "requests", id);
            try {
                await updateDoc(docRef, { [field]: increment(1) });
            } catch (e) {
                alert("Ошибка: " + e.message);
            }
        };

        // Функция редактирования названия
        window.editName = async (id, currentName) => {
            const newName = prompt("Введите новое имя профиля:", currentName);
            if (newName && newName !== currentName) {
                const docRef = doc(db, "requests", id);
                try {
                    await updateDoc(docRef, { name: newName });
                } catch (e) {
                    alert("Ошибка при редактировании: " + e.message);
                }
            }
        };

        document.getElementById('mainBtn').onclick = async () => {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            if (!name || !email) return alert("Заполните все поля");

            const btn = document.getElementById('mainBtn');
            btn.disabled = true;
            try {
                await addDoc(collection(db, "requests"), {
                    name: name,
                    email: email,
                    likes: 0,
                    dislikes: 0, // Инициализируем дизлайки при создании
                    timestamp: serverTimestamp()
                });
                document.getElementById('name').value = "";
                document.getElementById('email').value = "";
            } catch (e) {
                alert("Ошибка сохранения: проверьте Rules в Firebase!");
            }
            btn.disabled = false;
        };

        const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                feed.innerHTML += `
                    <div class="post">
                        <span class="time">${data.timestamp?.toDate().toLocaleString() || '...'}</span>
                        <b>${data.name}</b> 
                        <span class="edit-link" onclick="editName('${doc.id}', '${data.name}')">edit</span>
                        <p style="margin: 5px 0;">${data.email}</p>
                        <div class="btn-group">
                            <button class="like-btn" onclick="processReaction('${doc.id}', 'likes')">👍 ${data.likes || 0}</button>
                            <button class="like-btn" onclick="processReaction('${doc.id}', 'dislikes')">👎 ${data.dislikes || 0}</button>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
