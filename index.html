<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EcoLearn | Светлая академия</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(145deg, #e9f7e1 0%, #c8e6c9 100%);
            min-height: 100vh;
            padding: 32px 28px;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#2e7d32 0.8px, transparent 0.8px);
            background-size: 28px 28px;
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
        }

        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .grid-unique {
            display: grid;
            grid-template-columns: 1fr 0.9fr;
            gap: 28px;
        }

        .grid-reverse {
            display: grid;
            grid-template-columns: 0.8fr 1.1fr;
            gap: 28px;
        }

        .full-card {
            width: 100%;
        }

        .card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            padding: 28px 30px;
            box-shadow: 0 20px 35px -12px rgba(46, 125, 50, 0.2), 0 0 0 1px rgba(76, 175, 80, 0.2);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid #d0ebc0;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 28px 38px -16px #2e7d3240;
            border-color: #81c784;
        }

        h1 {
            font-size: 2.6rem;
            font-weight: 700;
            color: #1b5e20;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        h1 i {
            background: linear-gradient(135deg, #2e7d32, #66bb6a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 2.2rem;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 22px;
            color: #1b4d1b;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 5px solid #81c784;
            padding-left: 18px;
        }

        .btn-google {
            background: #f1f8e9;
            border: 2px solid #66bb6a;
            color: #2e5c2e;
            border-radius: 60px;
            padding: 16px 28px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
            box-shadow: 0 4px 10px #b9f6ca40;
        }

        .btn-google:hover {
            background: #e8f5e9;
            border-color: #2e7d32;
            transform: scale(0.98);
        }

        .profile-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            background: #f9fff7;
            border-radius: 80px;
            padding: 12px 24px;
            margin-bottom: 24px;
            border: 1px solid #c5e0b4;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .avatar {
            width: 56px;
            height: 56px;
            background: linear-gradient(145deg, #a5d6a7, #66bb6a);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: bold;
            color: #1b4d1b;
        }

        .user-name {
            font-weight: 700;
            font-size: 1.3rem;
            color: #1f4f1f;
        }

        .user-email {
            font-size: 0.75rem;
            color: #558b2f;
        }

        .logout-btn {
            background: #fbe9e7;
            border: 1px solid #ef9a9a;
            color: #bf360c;
            border-radius: 40px;
            padding: 8px 22px;
            font-weight: 600;
            cursor: pointer;
        }

        .timer-glow {
            background: linear-gradient(125deg, #f1f9ec, #e1f5e8);
            border-radius: 48px;
            padding: 24px;
            text-align: center;
            border: 1px solid #b9f6ca;
        }

        .timer-digits {
            font-family: 'Space Grotesk', monospace;
            font-size: 3.5rem;
            font-weight: 700;
            color: #2b5e2b;
            letter-spacing: 6px;
            background: #ffffffb3;
            display: inline-block;
            padding: 12px 32px;
            border-radius: 80px;
            margin: 12px 0;
        }

        .btn-group {
            display: flex;
            gap: 14px;
            justify-content: center;
            margin-top: 16px;
        }

        .btn {
            border: none;
            border-radius: 60px;
            padding: 12px 28px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-start { background: #2e7d32; color: white; }
        .btn-pause { background: #f9a825; color: #2c2c2c; }
        .btn-end { background: #d32f2f; color: white; }

        .stats-row {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            margin: 20px 0 12px;
        }

        .stat-bubble {
            background: #f9fff7;
            border-radius: 32px;
            padding: 14px 8px;
            text-align: center;
            flex: 1;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: #388e3c;
        }

        .user-entry, .rank-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #ffffffba;
            border-radius: 28px;
            margin-bottom: 10px;
            border: 1px solid #c8e6c9;
        }

        .online-led {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #2e7d32;
            box-shadow: 0 0 4px #4caf50;
            display: inline-block;
            margin-right: 10px;
        }

        .offline-led {
            background: #bdbdbd;
            box-shadow: none;
        }

        .messages-window {
            height: 270px;
            overflow-y: auto;
            background: #ffffff;
            border-radius: 32px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .msg-bubble {
            background: #eaf7e6;
            border-radius: 24px;
            padding: 12px 18px;
            margin-bottom: 14px;
            border-left: 4px solid #81c784;
        }

        .msg-sender {
            font-weight: 700;
            color: #2b5e2b;
        }

        .chat-input-row {
            display: flex;
            gap: 12px;
        }

        .chat-input-row input {
            flex: 1;
            padding: 14px 20px;
            border-radius: 60px;
            border: 1px solid #a5d6a7;
            background: white;
            font-family: inherit;
        }

        .send-chat {
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 60px;
            padding: 0 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .achievements-flex {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 18px;
            margin-top: 16px;
        }

        .achieve-card {
            background: #ffffffcc;
            border-radius: 32px;
            padding: 16px;
            text-align: center;
            border: 1px solid #c5e1a5;
        }

        .achieve-card.unlocked {
            background: linear-gradient(145deg, #e8f5e9, #dcedc8);
            border: 1px solid #66bb6a;
        }

        .notification-toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2e7d32;
            color: #f1f9e6;
            padding: 14px 24px;
            border-radius: 60px;
            font-weight: 600;
            z-index: 999;
        }

        .hidden { display: none; }
        .loading-spinner { text-align: center; padding: 40px; color: #2e7d32; }
        .error-box { background: #ffebee; color: #c62828; padding: 16px; border-radius: 28px; margin-top: 20px; text-align: center; }

        @media (max-width: 880px) {
            .grid-unique, .grid-reverse { grid-template-columns: 1fr; gap: 20px; }
            body { padding: 20px; }
        }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="full-card" id="authCard">
        <div class="card" style="text-align: center;">
            <h1><i class="fas fa-leaf"></i> GreenMind<span style="font-weight: 400;"> | эко-учеба</span></h1>
            <div id="authContent">
                <div class="loading-spinner"><i class="fas fa-spinner fa-pulse"></i> загрузка...</div>
            </div>
        </div>
    </div>

    <div id="appWrapper" class="hidden">
        <div class="full-card">
            <div class="card">
                <div class="profile-flex">
                    <div class="user-badge">
                        <div class="avatar" id="userAvatar">🌿</div>
                        <div>
                            <div class="user-name" id="userName"></div>
                            <div class="user-email" id="userEmail"></div>
                        </div>
                    </div>
                    <button class="logout-btn" id="logoutBtn"><i class="fas fa-door-open"></i> Выйти</button>
                </div>
                <div class="timer-glow">
                    <div class="timer-digits" id="timerDisplay">00:00:00</div>
                    <div class="total-label" id="totalStudyDisplay">📗 Всего учёбы: 0 мин</div>
                    <div class="btn-group">
                        <button class="btn btn-start" id="startBtn"><i class="fas fa-play"></i> Начать</button>
                        <button class="btn btn-pause" id="pauseBtn"><i class="fas fa-pause"></i> Перерыв</button>
                        <button class="btn btn-end" id="endBtn"><i class="fas fa-stop"></i> Завершить</button>
                    </div>
                </div>
                <div class="stats-row">
                    <div class="stat-bubble"><div class="stat-number" id="sessionCount">0</div><div>сессии</div></div>
                    <div class="stat-bubble"><div class="stat-number" id="messageCount">0</div><div>сообщения</div></div>
                    <div class="stat-bubble"><div class="stat-number" id="achievementCount">0</div><div>бейджи</div></div>
                    <div class="stat-bubble"><div class="stat-number" id="rankPlace">#?</div><div>место</div></div>
                </div>
            </div>
        </div>

        <div class="grid-unique">
            <div class="card">
                <h2><i class="fas fa-users"></i> Участники · <span id="onlineCount" style="color:#2e7d32;">0</span> онлайн</h2>
                <div id="groupList" style="max-height: 360px; overflow-y: auto;"></div>
            </div>
            <div class="card">
                <h2><i class="fas fa-chart-simple"></i> Топ эко-студентов</h2>
                <div id="leaderboardList"></div>
            </div>
        </div>

        <div class="grid-reverse">
            <div class="card">
                <h2><i class="fas fa-seedling"></i> Достижения</h2>
                <div id="achievementsList" class="achievements-flex"></div>
            </div>
            <div class="card">
                <h2><i class="fas fa-comments"></i> Живой чат</h2>
                <div class="messages-window" id="chatMessages"></div>
                <div class="chat-input-row">
                    <input type="text" id="chatInput" placeholder="напиши сообщение..." maxlength="300">
                    <button class="send-chat" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    (async () => {
        const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm');
        const SUPABASE_URL = 'https://ebthetkjsjztqrphpezd.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVidGhldGtqc2p6dHFycGhwZXpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NjIzMTgsImV4cCI6MjA5MjIzODMxOH0.NkFoTjxVR-d2rvxCtGE4WuP659YSm2dblZfjj1gPjUU';
        
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY, {
            auth: {
                autoRefreshToken: true,
                persistSession: true,
                detectSessionInUrl: true,
                flowType: 'pkce'
            }
        });
        
        let currentUser = null;
        let sessionStartTime = null;
        let totalSeconds = 0;
        let timerInterval = null;
        let heartbeatInterval = null;
        let currentSessionCount = 0;
        
        const ACHIEVEMENTS_CONFIG = {
            early_bird: { id: 'early_bird', title: '🐦 Ранний эколог', desc: 'Вход до 8:00', icon: '🌅' },
            marathon: { id: 'marathon', title: '🌿 Эко-марафон', desc: '2+ часа за раз', icon: '🏃' },
            activist: { id: 'activist', title: '🍃 Голос леса', desc: '20 сообщений', icon: '💬' },
            first_step: { id: 'first_step', title: '🌱 Первый росток', desc: 'Первая сессия', icon: '🎯' },
            returning: { id: 'returning', title: '🔄 Возвращение', desc: 'Вернулся после перерыва', icon: '🔄' }
        };
        
        function showNotif(msg) {
            let el = document.createElement('div');
            el.className = 'notification-toast';
            el.innerHTML = `<i class="fas fa-gem"></i> ${msg}`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }
        
        async function unlockAchievement(achId) {
            if (!currentUser) return false;
            let { data: prof } = await supabase.from('profiles').select('achievements').eq('id', currentUser.id).single();
            let cur = prof?.achievements || [];
            if (cur.includes(achId)) return false;
            cur.push(achId);
            let { error } = await supabase.from('profiles').update({ achievements: cur }).eq('id', currentUser.id);
            if (!error) {
                showNotif(`🏅 Достижение: ${ACHIEVEMENTS_CONFIG[achId].title} — ${ACHIEVEMENTS_CONFIG[achId].desc}`);
                await loadAchievements();
                await updateUserStats();
                return true;
            }
            return false;
        }
        
        function formatTime(sec) { let h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60; return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }
        function formatTotal(sec) { let h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60); return h>0?`${h}ч ${m}мин`:`${m} мин`; }
        
        function updateTimerUI() {
            let timerDiv = document.getElementById('timerDisplay');
            let totalDiv = document.getElementById('totalStudyDisplay');
            if(sessionStartTime) timerDiv.innerText = formatTime(Math.floor((Date.now()-sessionStartTime)/1000));
            else timerDiv.innerText = '00:00:00';
            totalDiv.innerText = `📗 Всего учёбы: ${formatTotal(totalSeconds)}`;
        }
        
        async function loadAchievements() {
            if(!currentUser) return;
            let { data: prof } = await supabase.from('profiles').select('achievements').eq('id', currentUser.id).single();
            let unlocked = prof?.achievements || [];
            let container = document.getElementById('achievementsList');
            if(container) container.innerHTML = Object.values(ACHIEVEMENTS_CONFIG).map(a => `<div class="achieve-card ${unlocked.includes(a.id) ? 'unlocked' : ''}"><div style="font-size:2rem;">${a.icon}</div><div style="font-weight:600;">${a.title}</div><div style="font-size:0.7rem;">${a.desc}</div></div>`).join('');
        }
        
        async function loadLeaderboard() {
            let { data: tops } = await supabase.from('profiles').select('username, total_study_seconds').order('total_study_seconds', { ascending: false }).limit(8);
            let container = document.getElementById('leaderboardList');
            if(!container) return;
            if(currentUser){
                let { data: all } = await supabase.from('profiles').select('id, total_study_seconds').order('total_study_seconds', {ascending:false});
                if(all){ let rank = all.findIndex(u=>u.id===currentUser.id)+1; document.getElementById('rankPlace').innerHTML = `#${rank}`; }
            }
            container.innerHTML = (tops||[]).map((s,i)=> `<div class="rank-entry"><div><span style="font-weight:bold;">${i===0?'🥇':i===1?'🥈':i===2?'🥉':'📘'} ${escapeHtml(s.username||'Ученик')}</span><div style="font-size:0.7rem;">${formatTotal(s.total_study_seconds)}</div></div><div style="background:#c8e6c9; padding:4px 12px; border-radius:40px;">#${i+1}</div></div>`).join('');
        }
        
        async function updateUserStats() {
            if(!currentUser) return;
            let { data: p } = await supabase.from('profiles').select('message_count, achievements').eq('id', currentUser.id).single();
            if(p){ document.getElementById('messageCount').innerText = p.message_count||0; document.getElementById('achievementCount').innerText = `${p.achievements?.length||0}/${Object.keys(ACHIEVEMENTS_CONFIG).length}`; }
        }
        
        async function startSession() {
            if(!currentUser || sessionStartTime) return;
            let { data: prof } = await supabase.from('profiles').select('status').eq('id', currentUser.id).single();
            if(prof?.status === '☕ Перерыв') await unlockAchievement('returning');
            sessionStartTime = new Date();
            await supabase.from('profiles').update({ study_session_start: sessionStartTime.toISOString(), status: '📚 Учусь', last_seen: new Date().toISOString() }).eq('id', currentUser.id);
            if(timerInterval) clearInterval(timerInterval); timerInterval = setInterval(updateTimerUI, 1000);
            await loadGroupList();
        }
        
        async function pauseSession() {
            if(!currentUser || !sessionStartTime) return;
            let elapsed = Math.floor((Date.now()-sessionStartTime)/1000);
            if(elapsed>0){ totalSeconds+=elapsed; currentSessionCount++; document.getElementById('sessionCount').innerText = currentSessionCount; }
            sessionStartTime=null;
            await supabase.from('profiles').update({ total_study_seconds: totalSeconds, study_session_start: null, status: '☕ Перерыв', last_seen: new Date().toISOString() }).eq('id', currentUser.id);
            updateTimerUI(); await loadGroupList(); await loadLeaderboard();
        }
        
        async function endSession() {
            if(!currentUser) return;
            if(sessionStartTime){
                let elapsed = Math.floor((Date.now()-sessionStartTime)/1000);
                if(elapsed>0){ totalSeconds+=elapsed; currentSessionCount++; document.getElementById('sessionCount').innerText = currentSessionCount; if(elapsed>=7200) await unlockAchievement('marathon'); if(currentSessionCount===1) await unlockAchievement('first_step'); }
                sessionStartTime=null;
            }
            await supabase.from('profiles').update({ total_study_seconds: totalSeconds, study_session_start: null, status: '🏠 Дома', last_seen: new Date().toISOString() }).eq('id', currentUser.id);
            updateTimerUI(); await loadGroupList(); await loadLeaderboard();
        }
        
        async function loadGroupList() {
            if(!currentUser) return;
            let { data: users } = await supabase.from('profiles').select('id, username, status, last_seen, total_study_seconds').order('username');
            if(!users) return;
            let now = new Date(), twoMins = new Date(now-120000);
            let online = 0;
            let html = users.map(u => {
                let isOnline = u.last_seen ? new Date(u.last_seen) > twoMins : false;
                if(isOnline) online++;
                let icon = u.status?.includes('📚')?'📚':(u.status?.includes('☕')?'☕':'🏠');
                return `<div class="user-entry"><div style="display:flex; gap:12px;"><span class="${isOnline ? 'online-led' : 'offline-led'}"></span><span>${icon}</span><div><strong>${escapeHtml(u.username||'Аноним')}</strong><div style="font-size:0.7rem;">🌿 ${formatTotal(u.total_study_seconds)}</div></div></div><div style="font-size:0.7rem;">${isOnline ? '🟢 активен' : '⚫ офлайн'}</div></div>`;
            }).join('');
            document.getElementById('groupList').innerHTML = html || '<div>нет данных</div>';
            document.getElementById('onlineCount').innerText = online;
        }
        
        async function loadMessages() {
            let { data } = await supabase.from('messages').select('*').order('created_at', { ascending: true }).limit(100);
            let container = document.getElementById('chatMessages');
            if(!container) return;
            if(!data || data.length===0){ container.innerHTML = '<div style="text-align:center;">✨ Начните общение ✨</div>'; return; }
            container.innerHTML = data.map(m => `<div class="msg-bubble"><span class="msg-sender">${escapeHtml(m.username)}</span> <span style="font-size:0.7rem;">${new Date(m.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span><div style="margin-top:6px;">${escapeHtml(m.message)}</div></div>`).join('');
            container.scrollTop = container.scrollHeight;
        }
        
        async function sendMessage() {
            let input = document.getElementById('chatInput');
            let text = input.value.trim();
            if(!text || !currentUser) return;
            let username = currentUser.user_metadata?.full_name || currentUser.email?.split('@')[0] || 'GreenStudent';
            await supabase.from('messages').insert({ user_id: currentUser.id, username, message: text, created_at: new Date().toISOString() });
            let { data: prof } = await supabase.from('profiles').select('message_count').eq('id', currentUser.id).single();
            let newCnt = (prof?.message_count||0)+1;
            await supabase.from('profiles').update({ message_count: newCnt }).eq('id', currentUser.id);
            if(newCnt >= 20) await unlockAchievement('activist');
            input.value = '';
            await loadMessages();
            await updateUserStats();
        }
        
        async function updateLastSeen() { if(currentUser) await supabase.from('profiles').update({ last_seen: new Date().toISOString() }).eq('id', currentUser.id); }
        
        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
        
        // Обработка OAuth callback
        async function handleOAuthCallback() {
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            const accessToken = hashParams.get('access_token');
            if (accessToken) {
                const { data, error } = await supabase.auth.setSession({
                    access_token: accessToken,
                    refresh_token: hashParams.get('refresh_token') || ''
                });
                if (error) console.error('Session error:', error);
                window.location.hash = '';
            }
        }
        
        async function init() {
            await handleOAuthCallback();
            
            const { data: { user }, error } = await supabase.auth.getUser();
            
            if (user && !error) {
                currentUser = user;
                
                let { data: profile } = await supabase.from('profiles')
                    .select('total_study_seconds, study_session_start, status, message_count, achievements')
                    .eq('id', user.id)
                    .single();
                
                if (profile) {
                    totalSeconds = profile.total_study_seconds || 0;
                    if (profile.study_session_start && profile.status === '📚 Учусь') {
                        sessionStartTime = new Date(profile.study_session_start);
                        timerInterval = setInterval(updateTimerUI, 1000);
                    }
                    currentSessionCount = Math.floor(totalSeconds / 3600);
                } else {
                    await supabase.from('profiles').insert({
                        id: user.id,
                        username: user.user_metadata?.full_name || user.email?.split('@')[0] || 'Экостудент',
                        status: '🏠 Дома',
                        total_study_seconds: 0,
                        message_count: 0,
                        achievements: [],
                        last_seen: new Date().toISOString()
                    });
                }
                
                if (new Date().getHours() < 8) await unlockAchievement('early_bird');
                
                updateTimerUI();
                await loadAchievements();
                await updateUserStats();
                await loadLeaderboard();
                
                document.getElementById('authCard').classList.add('hidden');
                document.getElementById('appWrapper').classList.remove('hidden');
                document.getElementById('userName').innerText = user.user_metadata?.full_name || user.email?.split('@')[0] || 'Студент';
                document.getElementById('userEmail').innerText = user.email || '';
                document.getElementById('userAvatar').innerText = (user.user_metadata?.full_name?.charAt(0) || user.email?.charAt(0) || '🌿').toUpperCase();
                
                await updateLastSeen();
                heartbeatInterval = setInterval(updateLastSeen, 25000);
                await loadGroupList();
                await loadMessages();
                
                supabase.channel('messages')
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => loadMessages())
                    .subscribe();
                
                setInterval(() => { loadGroupList(); loadLeaderboard(); }, 7000);
            } else {
                document.getElementById('authContent').innerHTML = `
                    <button class="btn-google" id="googleLoginBtn">
                        <i class="fab fa-google"></i> Войти с Google 🌿
                    </button>
                    <p style="margin-top:22px; color:#33691e;">Учись, общайся, получай достижения</p>
                    ${error ? `<div class="error-box"><i class="fas fa-exclamation-triangle"></i> ${error.message}</div>` : ''}
                `;
                const googleBtn = document.getElementById('googleLoginBtn');
                if (googleBtn) {
                    googleBtn.addEventListener('click', async () => {
                        try {
                            const { error } = await supabase.auth.signInWithOAuth({
                                provider: 'google',
                                options: {
                                    redirectTo: window.location.origin + window.location.pathname,
                                    queryParams: { access_type: 'offline', prompt: 'consent' }
                                }
                            });
                            if (error) throw error;
                        } catch (err) {
                            console.error('Login error:', err);
                            alert('Ошибка входа: ' + err.message);
                        }
                    });
                }
            }
        }
        
        document.getElementById('startBtn')?.addEventListener('click', startSession);
        document.getElementById('pauseBtn')?.addEventListener('click', pauseSession);
        document.getElementById('endBtn')?.addEventListener('click', endSession);
        document.getElementById('logoutBtn')?.addEventListener('click', async () => { await supabase.auth.signOut(); location.reload(); });
        document.getElementById('sendBtn')?.addEventListener('click', sendMessage);
        document.getElementById('chatInput')?.addEventListener('keypress', (e) => { if(e.key==='Enter') sendMessage(); });
        
        supabase.auth.onAuthStateChange((event) => {
            if (event === 'SIGNED_OUT') location.reload();
            else if (event === 'SIGNED_IN') init();
        });
        
        await init();
    })();
</script>
</body>
</html>
