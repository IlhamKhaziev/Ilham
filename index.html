<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор статуса</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 24px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
        }

        h2 { margin-top: 0; font-size: 1.2rem; color: #1a1a1a; }
        #myInfo { color: #666; margin-bottom: 15px; font-size: 0.9rem; }

        .status-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s;
            border: 1px solid rgba(0,0,0,0.1);
        }

        .btn:hover { opacity: 0.9; }

        .btn-study { background-color: #28a745; }
        .btn-coffee { background-color: #ffc107; color: #000; }
        .btn-game { background-color: #17a2b8; }
        .btn-home { background-color: #6c757d; }

        .user-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .user-item:last-child { border-bottom: none; }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 12px;
            flex-shrink: 0;
            background-color: #adb5bd; /* Стандартный цвет для всех */
        }

        #groupList { margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Мой профиль</h2>
        <div id="myInfo">Загрузка профиля...</div>
        
        <div class="status-buttons">
            <button class="btn btn-study" onclick="changeStatus('📚 Учусь')">📚 Учусь</button>
            <button class="btn btn-coffee" onclick="changeStatus('☕ Кофе')">☕ Кофе</button>
            <button class="btn btn-game" onclick="changeStatus('🎮 В игре')">🎮 В игре</button>
            <button class="btn btn-home" onclick="changeStatus('🏠 Дома')">🏠 Дома</button>
        </div>
    </div>

    <div class="card">
        <h2>Монитор группы</h2>
        <div id="groupList"></div>
    </div>

    <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const URL = 'https://yyhxkerpjvntoflbmmny.supabase.co';
    const KEY = 'ВАШ_ПУБЛИЧНЫЙ_ANON_KEY'; // Возьмите его в Project Settings -> API
    const supabase = createClient(URL, KEY);

    // Вход через Google
    window.login = async () => {
        await supabase.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: window.location.href }
        });
    };

    // Выход
    window.logout = async () => {
        await supabase.auth.signOut();
        location.reload();
    };

    // Смена статуса
    window.changeStatus = async (text) => {
        const { data: { user } } = await supabase.auth.getUser();
        
        if (!user) {
            alert("Сначала войдите через Google!");
            return;
        }

        // Сохраняем в базу: если записи нет - создаст, если есть - обновит
        const { error } = await supabase
            .from('profiles')
            .upsert({ 
                id: user.id, 
                username: user.user_metadata.full_name || user.email,
                status: text 
            });

        if (error) alert("Ошибка БД: " + error.message);
        fetchGroup();
    };

    async function fetchGroup() {
        const { data, error } = await supabase
            .from('profiles')
            .select('*')
            .order('username');

        if (error) return;

        const list = document.getElementById('groupList');
        list.innerHTML = data.map(user => `
            <div class="user-item">
                <div class="status-dot"></div>
                <div>
                    <strong>${user.username}</strong><br>
                    <small>${user.status || 'Просто смотрит'}</small>
                </div>
            </div>
        `).join('');
    }

    // Проверка: залогинен ли пользователь прямо сейчас?
    async function checkUser() {
        const { data: { user } } = await supabase.auth.getUser();
        const info = document.getElementById('myInfo');

        if (user) {
            info.innerHTML = `Привет, <b>${user.user_metadata.full_name}</b> <a href="#" onclick="logout()">Выйти</a>`;
        } else {
            info.innerHTML = `<button onclick="login()" style="width:100%; padding:10px; cursor:pointer">Войти через Google</button>`;
        }
    }

    checkUser();
    fetchGroup();
    setInterval(fetchGroup, 5000); // Обновлять список каждые 5 сек
</script>
</body>
</html>
