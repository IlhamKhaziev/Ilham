<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор статуса группы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 28px;
            margin-bottom: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.15);
        }

        h2 {
            margin: 0 0 20px 0;
            font-size: 1.3rem;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h2::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        #myInfo {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .status-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
        }

        .btn {
            border: none;
            border-radius: 10px;
            padding: 12px 16px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-study { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; }
        .btn-coffee { background: linear-gradient(135deg, #f2994a 0%, #f2c94c 100%); color: #333; }
        .btn-game { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; }
        .btn-home { background: linear-gradient(135deg, #8e9eab 0%, #eef2f3 100%); color: #333; }
        .btn-google { background: linear-gradient(135deg, #4285F4 0%, #34A853 100%); color: white; width: 100%; }

        .user-item {
            display: flex;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #e9ecef;
            transition: background 0.2s;
        }

        .user-item:hover {
            background: #f8f9fa;
            margin: 0 -10px;
            padding: 14px 10px;
            border-radius: 10px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 14px;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .user-info {
            flex-grow: 1;
        }

        .username {
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .status-text {
            color: #6c757d;
            font-size: 0.85rem;
        }

        .logout-btn {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }

        .status-buttons.disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .loading {
            text-align: center;
            color: #6c757d;
            padding: 30px;
        }

        .online-count {
            display: inline-block;
            background: #28a745;
            color: white;
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 0.75rem;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>👤 Мой профиль</h2>
            <div id="myInfo">Загрузка...</div>
            
            <div id="statusButtons" class="status-buttons">
                <button class="btn btn-study" onclick="changeStatus('📚 Учусь')">📚 Учусь</button>
                <button class="btn btn-coffee" onclick="changeStatus('☕ Пью кофе')">☕ Кофе</button>
                <button class="btn btn-game" onclick="changeStatus('🎮 В игре')">🎮 В игре</button>
                <button class="btn btn-home" onclick="changeStatus('🏠 Дома')">🏠 Дома</button>
            </div>
        </div>

        <div class="card">
            <h2>👥 Монитор группы <span id="usersCount" class="online-count">0</span></h2>
            <div id="groupList"></div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        // Конфигурация Supabase
        const SUPABASE_URL = 'https://ebthetkjsjztqrphpezd.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_idalKmPYLEUAMuEl0hjZEQ_CjFIWrRZ';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // Получение полного URL текущей страницы (важно для GitHub Pages)
        const getCurrentUrl = () => {
            let url = window.location.href;
            // Удаляем hash fragment если есть
            url = url.split('#')[0];
            // Удаляем query параметры если есть
            url = url.split('?')[0];
            return url;
        };

        // Глобальные функции
        window.login = async () => {
            try {
                const redirectUrl = getCurrentUrl();
                console.log('Redirect URL:', redirectUrl);
                
                const { data, error } = await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: redirectUrl,
                        queryParams: {
                            access_type: 'offline',
                            prompt: 'select_account'
                        }
                    }
                });
                
                if (error) throw error;
            } catch (error) {
                console.error('Login error:', error);
                alert('Ошибка входа: ' + error.message);
            }
        };

        window.logout = async () => {
            try {
                const { error } = await supabase.auth.signOut();
                if (error) throw error;
                window.location.reload();
            } catch (error) {
                console.error('Logout error:', error);
                alert('Ошибка выхода: ' + error.message);
            }
        };

        window.changeStatus = async (status) => {
            try {
                const { data: { user }, error: userError } = await supabase.auth.getUser();
                
                if (userError) throw userError;
                if (!user) {
                    alert('Пожалуйста, сначала войдите в аккаунт!');
                    return;
                }

                const { error: upsertError } = await supabase
                    .from('profiles')
                    .upsert({
                        id: user.id,
                        username: user.user_metadata.full_name || user.email,
                        avatar_url: user.user_metadata.avatar_url,
                        status: status,
                        updated_at: new Date().toISOString()
                    });

                if (upsertError) throw upsertError;
                
                // Обновляем список
                await fetchGroup();
            } catch (error) {
                console.error('Change status error:', error);
                alert('Ошибка изменения статуса: ' + error.message);
            }
        };

        // Получение эмодзи для статуса
        const getStatusEmoji = (status) => {
            if (status?.includes('Учусь')) return '📚';
            if (status?.includes('Кофе')) return '☕';
            if (status?.includes('Игре')) return '🎮';
            if (status?.includes('Дома')) return '🏠';
            return '💬';
        };

        // Загрузка списка пользователей
        async function fetchGroup() {
            try {
                const { data: profiles, error } = await supabase
                    .from('profiles')
                    .select('id, username, status')
                    .order('username', { ascending: true });

                if (error) throw error;

                const listElement = document.getElementById('groupList');
                const usersCountElement = document.getElementById('usersCount');
                
                if (!profiles || profiles.length === 0) {
                    listElement.innerHTML = '<div class="loading">👻 Пока нет пользователей</div>';
                    usersCountElement.textContent = '0';
                    return;
                }

                usersCountElement.textContent = profiles.length;
                
                listElement.innerHTML = profiles.map(user => `
                    <div class="user-item">
                        <div class="user-avatar">
                            ${getStatusEmoji(user.status)}
                        </div>
                        <div class="user-info">
                            <div class="username">${escapeHtml(user.username || 'Аноним')}</div>
                            <div class="status-text">${escapeHtml(user.status || 'Статус не задан')}</div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Fetch group error:', error);
                document.getElementById('groupList').innerHTML = '<div class="loading">⚠️ Ошибка загрузки списка</div>';
            }
        }

        // Защита от XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Проверка состояния пользователя
        async function checkUser() {
            try {
                const { data: { user }, error } = await supabase.auth.getUser();
                
                if (error) throw error;

                const statusButtons = document.getElementById('statusButtons');
                const myInfo = document.getElementById('myInfo');

                if (user) {
                    // Пользователь авторизован
                    myInfo.innerHTML = `
                        <span>✨ <strong>${escapeHtml(user.user_metadata.full_name || user.email)}</strong></span>
                        <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
                    `;
                    statusButtons.classList.remove('disabled');
                    
                    // Убеждаемся что профиль существует
                    const { data: profile } = await supabase
                        .from('profiles')
                        .select('id')
                        .eq('id', user.id)
                        .single();
                    
                    if (!profile) {
                        // Создаём профиль если его нет
                        await supabase
                            .from('profiles')
                            .insert({
                                id: user.id,
                                username: user.user_metadata.full_name || user.email,
                                status: '🏠 Дома'
                            });
                    }
                } else {
                    // Пользователь не авторизован
                    myInfo.innerHTML = `
                        <button class="btn btn-google" onclick="login()">
                            🚀 Войти через Google
                        </button>
                    `;
                    statusButtons.classList.add('disabled');
                }
            } catch (error) {
                console.error('Check user error:', error);
            }
        }

        // Обработка сессии после редиректа от Google
        async function handleAuthRedirect() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                await checkUser();
                await fetchGroup();
            }
        }

        // Подписка на изменения статуса пользователей в реальном времени
        function subscribeToChanges() {
            supabase
                .channel('profiles_changes')
                .on('postgres_changes', 
                    { event: '*', schema: 'public', table: 'profiles' }, 
                    () => {
                        fetchGroup();
                    }
                )
                .subscribe();
        }

        // Инициализация приложения
        async function init() {
            await handleAuthRedirect();
            await checkUser();
            await fetchGroup();
            subscribeToChanges();
            
            // Обновляем список каждые 30 секунд как резервный вариант
            setInterval(fetchGroup, 30000);
        }

        // Запуск приложения
        init();
    </script>
</body>
</html>
