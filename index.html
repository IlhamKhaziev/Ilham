<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учебная платформа</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 16px;
            color: #1e293b;
            text-align: center;
        }

        h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #1e293b;
            border-left: 4px solid #667eea;
            padding-left: 16px;
        }

        .btn-google {
            background: #4285F4;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }

        .btn-google:hover {
            background: #3367d6;
            transform: translateY(-1px);
        }

        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            background: #f8fafc;
            padding: 16px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .avatar {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
        }

        .user-name {
            font-weight: 700;
            font-size: 1.2rem;
        }

        .user-email {
            font-size: 0.8rem;
            color: #64748b;
        }

        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            cursor: pointer;
            font-weight: 600;
        }

        .timer-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            margin-bottom: 20px;
        }

        .timer-display {
            font-family: monospace;
            font-size: 3rem;
            font-weight: 700;
            color: #facc15;
            letter-spacing: 4px;
        }

        .total-study {
            color: #94a3b8;
            margin: 16px 0;
        }

        .session-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            border-radius: 40px;
            padding: 10px 24px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-start { background: #10b981; color: white; }
        .btn-pause { background: #f59e0b; color: #1e293b; }
        .btn-end { background: #ef4444; color: white; }

        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        .user-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .online-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22c55e;
        }

        .offline-dot {
            background: #94a3b8;
        }

        .chat-messages {
            height: 300px;
            overflow-y: auto;
            background: #f8fafc;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .message {
            background: white;
            border-radius: 18px;
            padding: 10px 16px;
            margin-bottom: 12px;
        }

        .message strong {
            color: #2563eb;
        }

        .message-time {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-left: 12px;
        }

        .chat-input {
            display: flex;
            gap: 12px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            font-size: 0.9rem;
        }

        .send-btn {
            background: #667eea;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 0 24px;
            cursor: pointer;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
            text-align: center;
        }

        .hidden {
            display: none;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card" id="authCard">
        <h1>📚 Учебная платформа</h1>
        <div id="authContent">
            <div class="loading">⏳ Загрузка...</div>
        </div>
    </div>

    <div class="card hidden" id="appCard">
        <div class="profile-header">
            <div class="user-info">
                <div class="avatar" id="userAvatar">👤</div>
                <div>
                    <div class="user-name" id="userName"></div>
                    <div class="user-email" id="userEmail"></div>
                </div>
            </div>
            <button class="logout-btn" id="logoutBtn">Выйти</button>
        </div>

        <div class="timer-card">
            <div class="timer-display" id="timerDisplay">00:00:00</div>
            <div class="total-study" id="totalStudyDisplay">📚 Всего учёбы: 0 мин</div>
            <div class="session-buttons">
                <button class="btn btn-start" id="startBtn">▶ Начать</button>
                <button class="btn btn-pause" id="pauseBtn">⏸ Перерыв</button>
                <button class="btn btn-end" id="endBtn">⏹ Завершить</button>
            </div>
        </div>
    </div>

    <div class="card hidden" id="groupCard">
        <h2>👥 Монитор группы <span id="onlineCount">0</span> онлайн</h2>
        <div id="groupList"></div>
    </div>

    <div class="card hidden" id="chatCard">
        <h2>💬 Общий чат</h2>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input">
            <input type="text" id="chatInput" placeholder="Напишите сообщение..." maxlength="300">
            <button class="send-btn" id="sendBtn">Отправить</button>
        </div>
    </div>
</div>

<script>
    // Ждём полной загрузки страницы
    document.addEventListener('DOMContentLoaded', async () => {
        // Динамически загружаем Supabase
        const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm');
        
        const SUPABASE_URL = 'https://ebthetkjsjztqrphpezd.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVidGhldGtqc2p6dHFycGhwZXpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NjIzMTgsImV4cCI6MjA5MjIzODMxOH0.NkFoTjxVR-d2rvxCtGE4WuP659YSm2dblZfjj1gPjUU';
        
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // Глобальные переменные
        let currentUser = null;
        let sessionStartTime = null;
        let totalSeconds = 0;
        let timerInterval = null;
        let heartbeatInterval = null;
        
        // Форматирование времени
        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }
        
        function formatTotal(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            return h > 0 ? `${h}ч ${m}мин` : `${m} мин`;
        }
        
        function updateTimerUI() {
            const timerDisplay = document.getElementById('timerDisplay');
            const totalDisplay = document.getElementById('totalStudyDisplay');
            if (sessionStartTime) {
                const elapsed = Math.floor((Date.now() - sessionStartTime) / 1000);
                timerDisplay.textContent = formatTime(elapsed);
            } else {
                timerDisplay.textContent = '00:00:00';
            }
            totalDisplay.textContent = `📚 Всего учёбы: ${formatTotal(totalSeconds)}`;
        }
        
        // Сессии
        async function startSession() {
            if (!currentUser) return;
            if (sessionStartTime) return;
            sessionStartTime = new Date();
            await supabase.from('profiles').update({
                study_session_start: sessionStartTime.toISOString(),
                status: '📚 Учусь',
                last_seen: new Date().toISOString()
            }).eq('id', currentUser.id);
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimerUI, 1000);
            await loadGroupList();
        }
        
        async function pauseSession() {
            if (!currentUser || !sessionStartTime) return;
            const elapsed = Math.floor((Date.now() - sessionStartTime) / 1000);
            if (elapsed > 0) totalSeconds += elapsed;
            sessionStartTime = null;
            await supabase.from('profiles').update({
                total_study_seconds: totalSeconds,
                study_session_start: null,
                status: '☕ Перерыв',
                last_seen: new Date().toISOString()
            }).eq('id', currentUser.id);
            updateTimerUI();
            await loadGroupList();
        }
        
        async function endSession() {
            if (!currentUser) return;
            if (sessionStartTime) {
                const elapsed = Math.floor((Date.now() - sessionStartTime) / 1000);
                if (elapsed > 0) totalSeconds += elapsed;
                sessionStartTime = null;
            }
            await supabase.from('profiles').update({
                total_study_seconds: totalSeconds,
                study_session_start: null,
                status: '🏠 Дома',
                last_seen: new Date().toISOString()
            }).eq('id', currentUser.id);
            updateTimerUI();
            await loadGroupList();
        }
        
        // Загрузка списка группы
        async function loadGroupList() {
            if (!currentUser) return;
            const { data: users, error } = await supabase
                .from('profiles')
                .select('id, username, status, last_seen, total_study_seconds')
                .order('username');
            if (error) return;
            
            const now = new Date();
            const twoMinsAgo = new Date(now - 120000);
            let onlineCount = 0;
            
            const html = users.map(u => {
                const isOnline = u.last_seen ? new Date(u.last_seen) > twoMinsAgo : false;
                if (isOnline) onlineCount++;
                const icon = u.status?.includes('📚') ? '📚' : (u.status?.includes('☕') ? '☕' : (u.status?.includes('🎮') ? '🎮' : '🏠'));
                return `
                    <div class="user-item">
                        <div class="user-left">
                            <span class="online-dot ${isOnline ? '' : 'offline-dot'}"></span>
                            <span style="font-size: 1.2rem;">${icon}</span>
                            <div>
                                <strong>${escapeHtml(u.username || 'Аноним')}</strong>
                                <div style="font-size: 0.7rem; color: #10b981;">📖 ${formatTotal(u.total_study_seconds || 0)}</div>
                            </div>
                        </div>
                        <div style="font-size: 0.75rem;">${isOnline ? '🟢 онлайн' : '⚫ офлайн'}</div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('groupList').innerHTML = html || '<div style="padding: 20px; text-align: center;">Нет участников</div>';
            document.getElementById('onlineCount').textContent = onlineCount;
        }
        
        // Чат
        async function loadMessages() {
            const { data, error } = await supabase
                .from('messages')
                .select('*')
                .order('created_at', { ascending: true })
                .limit(100);
            if (error) return;
            const container = document.getElementById('chatMessages');
            if (!data || data.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #94a3b8;">✨ Напишите первое сообщение</div>';
                return;
            }
            container.innerHTML = data.map(msg => `
                <div class="message">
                    <strong>${escapeHtml(msg.username)}</strong>
                    <span class="message-time">${new Date(msg.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                    <div style="margin-top: 6px;">${escapeHtml(msg.message)}</div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }
        
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text || !currentUser) return;
            const username = currentUser.user_metadata?.full_name || currentUser.email?.split('@')[0] || 'Пользователь';
            await supabase.from('messages').insert({
                user_id: currentUser.id,
                username: username,
                message: text,
                created_at: new Date().toISOString()
            });
            input.value = '';
            await loadMessages();
        }
        
        // Heartbeat
        async function updateLastSeen() {
            if (!currentUser) return;
            await supabase.from('profiles').update({ last_seen: new Date().toISOString() }).eq('id', currentUser.id);
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Инициализация авторизации
        async function init() {
            const { data: { user } } = await supabase.auth.getUser();
            
            if (user) {
                currentUser = user;
                
                // Загружаем профиль
                const { data: profile } = await supabase
                    .from('profiles')
                    .select('total_study_seconds, study_session_start, status')
                    .eq('id', user.id)
                    .single();
                
                if (profile) {
                    totalSeconds = profile.total_study_seconds || 0;
                    if (profile.study_session_start && profile.status === '📚 Учусь') {
                        sessionStartTime = new Date(profile.study_session_start);
                        timerInterval = setInterval(updateTimerUI, 1000);
                    }
                } else {
                    await supabase.from('profiles').insert({
                        id: user.id,
                        username: user.user_metadata?.full_name || user.email.split('@')[0],
                        avatar_url: user.user_metadata?.avatar_url,
                        status: '🏠 Дома',
                        total_study_seconds: 0,
                        last_seen: new Date().toISOString()
                    });
                }
                
                updateTimerUI();
                
                // Показываем интерфейс
                document.getElementById('authCard').classList.add('hidden');
                document.getElementById('appCard').classList.remove('hidden');
                document.getElementById('groupCard').classList.remove('hidden');
                document.getElementById('chatCard').classList.remove('hidden');
                
                document.getElementById('userName').textContent = user.user_metadata?.full_name || user.email.split('@')[0];
                document.getElementById('userEmail').textContent = user.email;
                document.getElementById('userAvatar').textContent = (user.user_metadata?.full_name?.charAt(0) || user.email.charAt(0)).toUpperCase();
                
                // Запускаем heartbeat
                await updateLastSeen();
                heartbeatInterval = setInterval(updateLastSeen, 25000);
                
                await loadGroupList();
                await loadMessages();
                
                // Подписка на чат
                supabase.channel('messages')
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => loadMessages())
                    .subscribe();
                
                setInterval(loadGroupList, 7000);
            } else {
                // Показываем кнопку входа
                document.getElementById('authContent').innerHTML = `
                    <button class="btn-google" id="googleLoginBtn">
                        🚀 Войти через Google
                    </button>
                    <p style="margin-top: 20px; text-align: center; color: #64748b;">
                        Войдите, чтобы отслеживать время учёбы,<br>
                        видеть онлайн-статус группы и общаться в чате.
                    </p>
                `;
                document.getElementById('googleLoginBtn')?.addEventListener('click', async () => {
                    const { error } = await supabase.auth.signInWithOAuth({
                        provider: 'google',
                        options: { redirectTo: window.location.href }
                    });
                    if (error) alert("Ошибка входа: " + error.message);
                });
            }
        }
        
        // Кнопки
        document.getElementById('startBtn')?.addEventListener('click', startSession);
        document.getElementById('pauseBtn')?.addEventListener('click', pauseSession);
        document.getElementById('endBtn')?.addEventListener('click', endSession);
        document.getElementById('logoutBtn')?.addEventListener('click', async () => {
            await supabase.auth.signOut();
            location.reload();
        });
        document.getElementById('sendBtn')?.addEventListener('click', sendMessage);
        document.getElementById('chatInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        // Следим за изменением auth состояния
        supabase.auth.onAuthStateChange((event) => {
    if (event === 'SIGNED_OUT') {
        location.reload(); // При выходе перезагрузить страницу — это нормально
    } else if (event === 'SIGNED_IN') {
        // Убираем location.reload(), чтобы не было бесконечного цикла!
        init(); 
    }
        });
        
        init();
    });
</script>
</body>
</html>
