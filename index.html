<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Cloud Chat</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 600px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .auth-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; width: 100%; max-width: 600px; background: white; padding: 15px; border-radius: 12px; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; }

        /* Список пользователей */
        .users-list { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0; border-bottom: 1px solid #eee; margin-bottom: 15px; }
        .user-card { cursor: pointer; text-align: center; min-width: 70px; transition: 0.2s; }
        .user-card:hover { transform: scale(1.05); }
        .user-card img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid transparent; }
        .user-card.active img { border-color: #007bff; }
        .user-card p { font-size: 12px; margin: 5px 0; }

        /* Окно чата */
        #chatBox { height: 350px; overflow-y: auto; border: 1px solid #f0f0f0; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #fafafa; border-radius: 8px; }
        .msg { max-width: 70%; padding: 8px 15px; border-radius: 15px; font-size: 14px; position: relative; }
        .msg.sent { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 2px; }
        .msg.received { align-self: flex-start; background: #e9e9eb; color: #333; border-bottom-left-radius: 2px; }

        .input-area { display: flex; gap: 10px; margin-top: 15px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        .send-btn { background: #007bff; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="authSection" class="container" style="text-align: center;">
        <button id="loginBtn" style="padding: 15px 30px; cursor:pointer;">Войти через Google</button>
    </div>

    <div id="mainApp" class="hidden" style="width: 100%; max-width: 600px;">
        <div class="auth-bar">
            <div class="user-info">
                <img id="userPhoto" class="user-avatar" src="">
                <span id="userName" style="font-weight: bold;"></span>
            </div>
            <button id="logoutBtn" style="background:none; border:none; color:red; cursor:pointer;">Выйти</button>
        </div>

        <div class="container">
            <p style="font-size: 14px; color: #666;">Выберите собеседника:</p>
            <div id="usersList" class="users-list">
                </div>

            <div id="chatHeader" style="font-weight: bold; margin-bottom: 10px;">Чат не выбран</div>
            <div id="chatBox">
                <p style="text-align: center; color: #999;">Выберите, кому написать...</p>
            </div>

            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Ваше сообщение...">
                <button id="sendBtn" class="send-btn">➤</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, where, setDoc, doc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBucYbom6btGkn1kBhV72RXAd7dGamxJq0",
            authDomain: "ilham-d9438.firebaseapp.com",
            projectId: "ilham-d9438",
            storageBucket: "ilham-d9438.firebasestorage.app",
            messagingSenderId: "498564012469",
            appId: "1:498564012469:web:d3ace73422dac888b021fc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let selectedUserId = null;
        let unsubscribeChat = null;

        // 1. Авторизация и сохранение пользователя в БД
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('userName').innerText = user.displayName;
                document.getElementById('userPhoto').src = user.photoURL;

                // Сохраняем данные о пользователе в коллекцию "users"
                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid,
                    name: user.displayName,
                    photo: user.photoURL,
                    lastSeen: serverTimestamp()
                }, { merge: true });

                loadUsers();
            } else {
                document.getElementById('authSection').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('hidden');
            }
        });

        // 2. Загрузка списка всех пользователей (кроме себя)
        async function loadUsers() {
            const q = query(collection(db, "users"));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('usersList');
                list.innerHTML = "";
                snapshot.forEach((userDoc) => {
                    const userData = userDoc.data();
                    if (userData.uid === currentUser.uid) return;

                    const userEl = document.createElement('div');
                    userEl.className = `user-card ${selectedUserId === userData.uid ? 'active' : ''}`;
                    userEl.innerHTML = `
                        <img src="${userData.photo || 'https://via.placeholder.com/45'}">
                        <p>${userData.name.split(' ')[0]}</p>
                    `;
                    userEl.onclick = () => selectChat(userData);
                    list.appendChild(userEl);
                });
            });
        }

        // 3. Выбор чата
        function selectChat(targetUser) {
            selectedUserId = targetUser.uid;
            document.getElementById('chatHeader').innerText = `Чат с: ${targetUser.name}`;
            
            // Перерисовываем список (для активного состояния)
            loadUsers();

            // Если была старая подписка на сообщения — отменяем
            if (unsubscribeChat) unsubscribeChat();

            // Загружаем сообщения именно между мной и выбранным пользователем
            // Логика: (я -> он) ИЛИ (он -> я)
            const q = query(
                collection(db, "messages"),
                orderBy("timestamp", "asc")
            );

            unsubscribeChat = onSnapshot(q, (snapshot) => {
                const chatBox = document.getElementById('chatBox');
                chatBox.innerHTML = "";
                snapshot.forEach((msgDoc) => {
                    const msg = msgDoc.data();
                    // Фильтр на клиенте (в Firebase нужны составные индексы для сложных фильтров)
                    const isBetween = (msg.senderId === currentUser.uid && msg.receiverId === selectedUserId) ||
                                      (msg.senderId === selectedUserId && msg.receiverId === currentUser.uid);
                    
                    if (isBetween) {
                        const type = msg.senderId === currentUser.uid ? 'sent' : 'received';
                        chatBox.innerHTML += `<div class="msg ${type}">${msg.text}</div>`;
                    }
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        // 4. Отправка сообщения
        document.getElementById('sendBtn').onclick = async () => {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();

            if (!text || !selectedUserId) return;

            await addDoc(collection(db, "messages"), {
                senderId: currentUser.uid,
                receiverId: selectedUserId,
                text: text,
                timestamp: serverTimestamp()
            });

            input.value = "";
        };

        // Вход/Выход
        document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('logoutBtn').onclick = () => signOut(auth);
    </script>
</body>
</html>
