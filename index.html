<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Облачное приложение</title>
    <style>
        /* Ваши существующие стили */
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .auth-bar { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; }
        .logout-btn { background: #ff4757; width: auto; padding: 8px 15px; }

        /* Новые стили для загрузки фото */
        .upload-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        #previewImg { width: 100%; max-height: 200px; object-fit: cover; border-radius: 8px; display: none; margin-bottom: 10px; border: 1px solid #ddd; }
        .photo-btn { background: #6c757d; width: auto; padding: 8px 15px; font-size: 14px; }
        .post { background: white; border: 1px solid #eaeaea; padding: 15px; margin-top: 15px; border-radius: 8px; width: 100%; }
        .post-img { width: 100%; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="authSection" class="container" style="text-align: center;">
        <button id="loginBtn">Войти через Google</button>
        <div id="userInfo" style="display: none;" class="auth-bar">
            <img id="userPhoto" class="user-avatar" src="" alt="Avatar">
            <span id="userName" style="font-weight: bold;"></span>
            <button id="logoutBtn" class="logout-btn">Выйти</button>
        </div>
    </div>

    <div id="messageForm" class="container" style="display: none;">
        <h3>Создать запись</h3>
        <input type="text" id="name" placeholder="Имя профиля" readonly>
        <input type="email" id="email" placeholder="Ваш Email" readonly>
        <input type="text" id="content" placeholder="Что у вас нового?">
        
        <div class="upload-row">
            <button type="button" id="browseBtn" class="photo-btn">📁 Выбрать фото</button>
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
            <span id="fileName" style="font-size: 12px; color: #666;">Файл не выбран</span>
        </div>
        <img id="previewImg" src="">

        <button id="mainBtn">Опубликовать в облако</button>
    </div>

    <div id="feed" style="width: 100%; max-width: 500px;"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        // КРИТИЧЕСКИЙ ИМПОРТ ДЛЯ КАРТИНОК
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBucYbom6btGkn1kBhV72RXAd7dGamxJq0",
            authDomain: "ilham-d9438.firebaseapp.com",
            projectId: "ilham-d9438",
            storageBucket: "ilham-d9438.firebasestorage.app",
            messagingSenderId: "498564012469",
            appId: "1:498564012469:web:d3ace73422dac888b021fc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app); // Активируем Storage
        const provider = new GoogleAuthProvider();

        const fileInput = document.getElementById('fileInput');
        const previewImg = document.getElementById('previewImg');
        const fileNameText = document.getElementById('fileName');

        // Логика выбора файла
        document.getElementById('browseBtn').onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                fileNameText.innerText = file.name;
                previewImg.src = URL.createObjectURL(file);
                previewImg.style.display = 'block';
            }
        };

        // Авторизация
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('userInfo').style.display = 'flex';
                document.getElementById('messageForm').style.display = 'block';
                document.getElementById('userName').innerText = user.displayName;
                document.getElementById('userPhoto').src = user.photoURL;
                document.getElementById('name').value = user.displayName;
                document.getElementById('email').value = user.email;
            } else {
                document.getElementById('loginBtn').style.display = 'block';
                document.getElementById('userInfo').style.display = 'none';
                document.getElementById('messageForm').style.display = 'none';
            }
        });

        document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        // Публикация
       document.getElementById('mainBtn').onclick = async () => {
    const content = document.getElementById('content').value;
    const file = document.getElementById('fileInput').files[0]; // Берем файл из инпута
    
    if (!content && !file) return alert("Введите текст или выберите фото!");

    const btn = document.getElementById('mainBtn');
    btn.disabled = true;
    btn.innerText = "Публикация...";

    try {
        let fileUrl = "";

        // Загружаем фото, только если оно реально выбрано
        if (file) {
            const storageRef = ref(storage, 'images/' + Date.now() + "_" + file.name);
            const snapshot = await uploadBytes(storageRef, file);
            fileUrl = await getDownloadURL(snapshot.ref);
        }

        // Добавляем запись в базу
        await addDoc(collection(db, "requests"), {
            name: auth.currentUser.displayName,
            email: auth.currentUser.email,
            photo: auth.currentUser.photoURL,
            text: content,
            img: fileUrl, // Если фото нет, тут будет пустая строка
            likes: 0,
            timestamp: serverTimestamp()
        });

        // Очистка полей после успеха
        document.getElementById('content').value = "";
        document.getElementById('fileInput').value = "";
        document.getElementById('previewImg').style.display = 'none';
        alert("Опубликовано!");

    } catch (e) {
        console.error(e);
        alert("Ошибка! Проверьте консоль (F12) и правила Storage.");
    } finally {
        btn.disabled = false;
        btn.innerText = "Опубликовать в облако";
    }
};
        // Отображение ленты
        onSnapshot(query(collection(db, "requests"), orderBy("timestamp", "desc")), (snapshot) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                feed.innerHTML += `
                    <div class="post">
                        <b>${data.name}</b>
                        <p>${data.text || ""}</p>
                        ${data.img ? `<img src="${data.img}" class="post-img">` : ""}
                        <button onclick="processLike('${doc.id}')">👍 ${data.likes || 0}</button>
                    </div>`;
            });
        });

        window.processLike = (id) => updateDoc(doc(db, "requests", id), { likes: increment(1) });
    </script>
</body>
</html>
