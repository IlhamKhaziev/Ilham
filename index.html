<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор статуса группы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 28px;
            margin-bottom: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.15);
        }

        h2 {
            margin: 0 0 20px 0;
            font-size: 1.3rem;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h2::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        #myInfo {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar-large {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-name {
            font-weight: 600;
            color: #1a1a1a;
        }

        .status-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
        }

        .btn {
            border: none;
            border-radius: 10px;
            padding: 12px 16px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-study { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; }
        .btn-coffee { background: linear-gradient(135deg, #f2994a 0%, #f2c94c 100%); color: #333; }
        .btn-game { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; }
        .btn-home { background: linear-gradient(135deg, #8e9eab 0%, #eef2f3 100%); color: #333; }
        .btn-google { background: linear-gradient(135deg, #4285F4 0%, #34A853 100%); color: white; }
        .btn-email { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }

        .user-item {
            display: flex;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #e9ecef;
            transition: background 0.2s;
        }

        .user-item:hover {
            background: #f8f9fa;
            margin: 0 -10px;
            padding: 14px 10px;
            border-radius: 10px;
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            margin-right: 14px;
            flex-shrink: 0;
            object-fit: cover;
        }

        .user-avatar-placeholder {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 14px;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .user-info {
            flex-grow: 1;
        }

        .username {
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .status-text {
            color: #6c757d;
            font-size: 0.85rem;
        }

        .logout-btn {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }

        .status-buttons.disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .loading {
            text-align: center;
            color: #6c757d;
            padding: 30px;
        }

        .online-count {
            display: inline-block;
            background: #28a745;
            color: white;
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 0.75rem;
            margin-left: 10px;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 32px;
            max-width: 400px;
            width: 90%;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-content h3 {
            margin-bottom: 20px;
            color: #1a1a1a;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .modal-content input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-modal {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .auth-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .auth-buttons .btn {
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>👤 Мой профиль</h2>
            <div id="myInfo">Загрузка...</div>
            
            <div id="statusButtons" class="status-buttons">
                <button class="btn btn-study" onclick="changeStatus('📚 Учусь')">📚 Учусь</button>
                <button class="btn btn-coffee" onclick="changeStatus('☕ Пью кофе')">☕ Кофе</button>
                <button class="btn btn-game" onclick="changeStatus('🎮 В игре')">🎮 В игре</button>
                <button class="btn btn-home" onclick="changeStatus('🏠 Дома')">🏠 Дома</button>
            </div>
        </div>

        <div class="card">
            <h2>👥 Монитор группы <span id="usersCount" class="online-count">0</span></h2>
            <div id="groupList"></div>
        </div>
    </div>

    <!-- Модальное окно для email регистрации/входа -->
    <div id="emailModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">📝 Регистрация</h3>
            <input type="email" id="emailInput" placeholder="Email" autocomplete="off">
            <input type="password" id="passwordInput" placeholder="Пароль (мин. 6 символов)">
            <button class="btn-modal btn-primary" id="modalSubmitBtn">Зарегистрироваться</button>
            <button class="btn-modal btn-secondary" onclick="closeEmailModal()">Отмена</button>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        // Конфигурация Supabase
        const SUPABASE_URL = 'https://ebthetkjsjztqrphpezd.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_idalKmPYLEUAMuEl0hjZEQ_CjFIWrRZ';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // Получение полного URL текущей страницы
        const getCurrentUrl = () => {
            let url = window.location.href;
            url = url.split('#')[0];
            url = url.split('?')[0];
            return url;
        };

        // ========== АВТОРИЗАЦИЯ ==========
        
        // Вход через Google
        window.loginWithGoogle = async () => {
            try {
                const redirectUrl = getCurrentUrl();
                const { error } = await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: redirectUrl,
                        queryParams: {
                            access_type: 'offline',
                            prompt: 'select_account'
                        }
                    }
                });
                if (error) throw error;
            } catch (error) {
                console.error('Google login error:', error);
                alert('Ошибка входа: ' + error.message);
            }
        };

        // Выход
        window.logout = async () => {
            try {
                const { error } = await supabase.auth.signOut();
                if (error) throw error;
                window.location.reload();
            } catch (error) {
                console.error('Logout error:', error);
                alert('Ошибка выхода: ' + error.message);
            }
        };

        // Открытие модального окна для email
        window.openEmailModal = (type) => {
            const modal = document.getElementById('emailModal');
            const title = document.getElementById('modalTitle');
            const submitBtn = document.getElementById('modalSubmitBtn');
            const emailInput = document.getElementById('emailInput');
            const passwordInput = document.getElementById('passwordInput');
            
            emailInput.value = '';
            passwordInput.value = '';
            
            if (type === 'register') {
                title.textContent = '📝 Регистрация';
                submitBtn.textContent = 'Зарегистрироваться';
                submitBtn.onclick = () => registerWithEmail();
            } else {
                title.textContent = '🔐 Вход';
                submitBtn.textContent = 'Войти';
                submitBtn.onclick = () => loginWithEmail();
            }
            
            modal.style.display = 'flex';
        };

        window.closeEmailModal = () => {
            document.getElementById('emailModal').style.display = 'none';
        };

        // Регистрация по email
        async function registerWithEmail() {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            
            if (!email || !password) {
                alert('Заполните все поля');
                return;
            }
            
            if (password.length < 6) {
                alert('Пароль должен быть не менее 6 символов');
                return;
            }
            
            try {
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            full_name: email.split('@')[0]
                        }
                    }
                });
                
                if (error) throw error;
                
                if (data.user?.identities?.length === 0) {
                    alert('Пользователь с таким email уже существует');
                } else {
                    alert('Регистрация успешна! Проверьте почту для подтверждения.');
                }
                closeEmailModal();
            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        }

        // Вход по email
        async function loginWithEmail() {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            
            if (!email || !password) {
                alert('Заполните все поля');
                return;
            }
            
            try {
                const { error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                closeEmailModal();
                await checkUser();
                await fetchGroup();
            } catch (error) {
                alert('Ошибка входа: ' + error.message);
            }
        }

        // ========== СТАТУСЫ ==========
        
        window.changeStatus = async (status) => {
            try {
                const { data: { user }, error: userError } = await supabase.auth.getUser();
                
                if (userError) throw userError;
                if (!user) {
                    alert('Пожалуйста, сначала войдите в аккаунт!');
                    return;
                }

                const { error: upsertError } = await supabase
                    .from('profiles')
                    .upsert({
                        id: user.id,
                        username: user.user_metadata.full_name || user.email,
                        avatar_url: user.user_metadata.avatar_url,
                        status: status,
                        updated_at: new Date().toISOString()
                    });

                if (upsertError) throw upsertError;
                await fetchGroup();
            } catch (error) {
                console.error('Change status error:', error);
                alert('Ошибка изменения статуса: ' + error.message);
            }
        };

        // Получение эмодзи для статуса
        const getStatusEmoji = (status) => {
            if (status?.includes('Учусь')) return '📚';
            if (status?.includes('Кофе')) return '☕';
            if (status?.includes('Игре')) return '🎮';
            if (status?.includes('Дома')) return '🏠';
            return '💬';
        };

        // Загрузка списка пользователей с аватарками
        async function fetchGroup() {
            try {
                const { data: profiles, error } = await supabase
                    .from('profiles')
                    .select('id, username, status, avatar_url')
                    .order('username', { ascending: true });

                if (error) throw error;

                const listElement = document.getElementById('groupList');
                const usersCountElement = document.getElementById('usersCount');
                
                if (!profiles || profiles.length === 0) {
                    listElement.innerHTML = '<div class="loading">👻 Пока нет пользователей</div>';
                    usersCountElement.textContent = '0';
                    return;
                }

                usersCountElement.textContent = profiles.length;
                
                listElement.innerHTML = profiles.map(user => {
                    const hasAvatar = user.avatar_url && user.avatar_url !== 'null';
                    return `
                        <div class="user-item">
                            ${hasAvatar ? 
                                `<img class="user-avatar" src="${escapeHtml(user.avatar_url)}" alt="avatar">` :
                                `<div class="user-avatar-placeholder">${getStatusEmoji(user.status)}</div>`
                            }
                            <div class="user-info">
                                <div class="username">${escapeHtml(user.username || 'Аноним')}</div>
                                <div class="status-text">${escapeHtml(user.status || 'Статус не задан')}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Fetch group error:', error);
                document.getElementById('groupList').innerHTML = '<div class="loading">⚠️ Ошибка загрузки списка</div>';
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Проверка состояния пользователя
        async function checkUser() {
            try {
                const { data: { user }, error } = await supabase.auth.getUser();
                
                if (error) throw error;

                const statusButtons = document.getElementById('statusButtons');
                const myInfo = document.getElementById('myInfo');

                if (user) {
                    // Пользователь авторизован - показываем аватарку и имя
                    const avatarUrl = user.user_metadata.avatar_url;
                    const userName = user.user_metadata.full_name || user.email;
                    
                    myInfo.innerHTML = `
                        <div class="user-profile">
                            ${avatarUrl ? 
                                `<img class="user-avatar-large" src="${escapeHtml(avatarUrl)}" alt="avatar">` :
                                `<div class="user-avatar-large" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">${userName.charAt(0).toUpperCase()}</div>`
                            }
                            <div>
                                <div class="user-name">${escapeHtml(userName)}</div>
                                <small style="color: #6c757d;">${user.email}</small>
                            </div>
                        </div>
                        <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
                    `;
                    statusButtons.classList.remove('disabled');
                    
                    // Создаём профиль если его нет
                    const { data: profile } = await supabase
                        .from('profiles')
                        .select('id')
                        .eq('id', user.id)
                        .single();
                    
                    if (!profile) {
                        await supabase
                            .from('profiles')
                            .insert({
                                id: user.id,
                                username: userName,
                                avatar_url: avatarUrl,
                                status: '🏠 Дома'
                            });
                    } else if (profile && avatarUrl && profile.avatar_url !== avatarUrl) {
                        // Обновляем аватарку если изменилась
                        await supabase
                            .from('profiles')
                            .update({ avatar_url: avatarUrl })
                            .eq('id', user.id);
                    }
                } else {
                    // Пользователь не авторизован - показываем кнопки входа
                    myInfo.innerHTML = `
                        <div class="auth-buttons">
                            <button class="btn btn-email" onclick="openEmailModal('register')">
                                📝 Регистрация
                            </button>
                            <button class="btn btn-email" onclick="openEmailModal('login')">
                                🔐 Вход по email
                            </button>
                            <button class="btn btn-google" onclick="loginWithGoogle()">
                                🚀 Войти через Google
                            </button>
                        </div>
                    `;
                    statusButtons.classList.add('disabled');
                }
            } catch (error) {
                console.error('Check user error:', error);
            }
        }

        // Обработка сессии после редиректа
        async function handleAuthRedirect() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                await checkUser();
                await fetchGroup();
            }
        }

        // Подписка на изменения в реальном времени
        function subscribeToChanges() {
            supabase
                .channel('profiles_changes')
                .on('postgres_changes', 
                    { event: '*', schema: 'public', table: 'profiles' }, 
                    () => {
                        fetchGroup();
                    }
                )
                .subscribe();
        }

        // Закрытие модального окна по клику вне его
        window.onclick = (event) => {
            const modal = document.getElementById('emailModal');
            if (event.target === modal) {
                closeEmailModal();
            }
        };

        // Инициализация
        async function init() {
            await handleAuthRedirect();
            await checkUser();
            await fetchGroup();
            subscribeToChanges();
            setInterval(fetchGroup, 30000);
        }

        init();
    </script>
</body>
</html>
