<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BaaS - Управление данными</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button#mainBtn { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.3s; }
        button#mainBtn:disabled { background: #ccc; }
        
        .post { background: #fff; border: 1px solid #eaeaea; padding: 15px; margin-top: 15px; border-radius: 8px; width: 100%; max-width: 500px; position: relative; }
        .post b { font-size: 1.1em; color: #333; }
        .actions { display: flex; gap: 10px; margin-top: 10px; }
        
        /* Стили для всех кнопок действий */
        .btn-action { cursor: pointer; border: none; background: #f8f9fa; padding: 6px 14px; border-radius: 20px; font-size: 14px; transition: 0.2s; display: flex; align-items: center; gap: 5px;}
        .btn-action:hover { background: #e2e6ea; }
        
        /* Стили для синей кнопки редактирования */
        .btn-edit { background: #f0f7ff; color: #007bff; border: 1px solid #c2e0ff; }
        .btn-edit:hover { background: #e0f0ff; }
        
        .time { font-size: 11px; color: #999; float: right; }
    </style>
</head>
<body>

    <div class="container">
        <h3>Панель управления данными</h3>
        <input type="text" id="name" placeholder="Имя профиля">
        <input type="email" id="email" placeholder="Рабочий Email">
        <button id="mainBtn">Опубликовать в облако</button>
    </div>

    <div id="feed" style="width: 100%; max-width: 500px;"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { 
            getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
            serverTimestamp, updateDoc, doc, increment 
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBucYbom6btGkn1kBhV72RXAd7dGamxJq0",
            authDomain: "ilham-d9438.firebaseapp.com",
            projectId: "ilham-d9438",
            storageBucket: "ilham-d9438.firebasestorage.app",
            messagingSenderId: "498564012469",
            appId: "1:498564012469:web:d3ace73422dac888b021fc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ФУНКЦИЯ 1: Редактирование имени (через updateDoc)
        window.editEntry = async (id, oldName) => {
            const newName = prompt("Изменить имя профиля:", oldName);
            if (newName && newName !== oldName) {
                const docRef = doc(db, "requests", id);
                await updateDoc(docRef, { name: newName });
            }
        };

        // ФУНКЦИЯ 2: Лайки и Дизлайки (через increment)
        window.changeLikes = async (id, fieldName, value) => {
            const docRef = doc(db, "requests", id);
            try {
                // value: 1 для увеличения, -1 для уменьшения
                // fieldName: 'likes' или 'dislikes'
                await updateDoc(docRef, { [fieldName]: increment(value) });
            } catch (e) {
                console.error("Ошибка обновления:", e);
            }
        };

        // Отправка данных (теперь добавляем и dislikes)
        document.getElementById('mainBtn').onclick = async () => {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            if(!name || !email) return alert("Заполните поля!");

            const btn = document.getElementById('mainBtn');
            btn.disabled = true;
            try {
                await addDoc(collection(db, "requests"), {
                    name: name,
                    email: email,
                    likes: 0,
                    dislikes: 0, // Добавили инициализацию дизлайков
                    timestamp: serverTimestamp()
                });
                document.getElementById('email').value = "";
            } catch (e) {
                alert("Ошибка доступа.");
            }
            btn.disabled = false;
        };

        // Слушатель обновлений (автоматически перерисовывает все счетчики)
        const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                // Гарантируем, что если поля нет, то будет 0
                const numLikes = data.likes || 0;
                const numDislikes = data.dislikes || 0;

                feed.innerHTML += `
                    <div class="post">
                        <span class="time">${data.timestamp?.toDate().toLocaleString() || '...'}</span>
                        <b>${data.name}</b> 
                        
                        <p style="margin: 5px 0;">${data.email}</p>
                        
                        <div class="actions">
                            <button class="btn-action btn-edit" onclick="editEntry('${doc.id}', '${data.name}')">✏️ ред.</button>
                            <button class="btn-action" onclick="changeLikes('${doc.id}', 'likes', 1)">👍 ${numLikes}</button>
                            <button class="btn-action" onclick="changeLikes('${doc.id}', 'dislikes', 1)">👎 Дизлайк ${numDislikes}</button>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
